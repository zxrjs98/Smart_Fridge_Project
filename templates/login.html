<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshKeep - 로그인</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            color: #4a90e2;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        .input-group {
            margin-bottom: 1rem;
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: #4a90e2;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background-color: #357abd;
        }
        .footer-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #666;
        }
        .footer-links a {
            color: #4a90e2;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><i class="fas fa-snowflake"></i> FreshKeep</div>
        <form action="/login" method="post" autocomplete="off">
            {% if error %}
                <div style="color: #e74c3c; font-size: 0.9rem; font-weight: bold; margin-bottom: 1rem;">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </div>
            {% endif %}
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="아이디" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="login-btn">로그인</button>
        </form>
        <div class="footer-links">
            계정이 없으신가요? <a href="/register">회원가입</a>
        </div>

        <div style="display: flex; justify-content: center; gap: 30px; margin-top: 15px; font-size: 14px;">
        <a href="#" onclick="alert('팝업 구현예정'); return false;" style="color: #4a90e2; text-decoration: none;">ID 찾기</a>
        <a href="#" onclick="alert('팝업 구현예정'); return false;" style="color: #4a90e2; text-decoration: none;">비밀번호 찾기</a>
    </div>
    </div>
</body>
</html>
