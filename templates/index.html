<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FreshKeep - 스마트 냉장고</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        .item-card.urgent { border-left: 5px solid #ff4d4d; background: #fff5f5; }
        .item-card.warning { border-left: 5px solid #ffa500; background: #fffcf0; }
        .d-day-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 700; margin-left: 10px; }
        .badge-urgent { background: #ff4d4d; color: white; }
        .badge-warning { background: #ffa500; color: white; }
        .badge-normal { background: #4A90E2; color: white; }
        #addPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .ingredient-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; }
        .ing-item { aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #eee; border-radius: 15px; background: #fff; cursor: pointer; }
        .ing-item.selected { border: 2px solid #4A90E2; background: #eef6ff; }
        .ing-item.hidden { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header" style="display: flex; align-items: center; justify-content: center; gap: 12px; padding: 25px 0;">
            <img src="/static/images/fresh.png" alt="로고" style="width: 45px; height: 45px; object-fit: contain;">
            <h1 style="margin:0; font-weight:900; background:linear-gradient(135deg,#4A90E2,#63B3ED);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">FreshKeep</h1>
        </header>

        <div id="itemList">
            {% for item in items %}
            <div class="item-card {% if item.d_day < 0 %}urgent{% elif item.d_day <= 3 %}warning{% endif %}">
                <div class="info">
                    <span class="category" style="color:#888; font-size:0.9rem;">[{{ item.category }}]</span>
                    <strong class="name" style="font-size:1.1rem; display:block; margin:4px 0;">{{ item.name }}</strong>
                    
                    <div class="expiry-edit-zone" style="position: relative; cursor: pointer; display: inline-block;">
                        <span class="expiry-text" style="color:#666; font-size:0.9rem;">📅 ~ {{ item.expiry_date }}</span>
                        <input type="date" value="{{ item.expiry_date }}" 
                               style="position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;"
                               onchange="updateItemInline('{{ item.name }}', this)">
                        
                        <span class="d-day-badge {% if item.d_day < 0 %}badge-urgent{% elif item.d_day <= 3 %}badge-warning{% else %}badge-normal{% endif %}">
                            {% if item.d_day < 0 %}기한만료{% elif item.d_day == 0 %}D-Day{% else %}D-{{ item.d_day }}{% endif %}
                        </span>
                    </div>
                </div>
                <button class="delete-btn" onclick="deleteItem('{{ item.name }}')">삭제</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <button class="fab-button" onclick="openAddPage()" style="position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: #4A90E2; color: white; border: none; font-size: 2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">+</button>

    <div id="addPage">
        <div class="modal-header">
            <button onclick="closeAddPage()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
            <h3 style="margin:0; font-size:1.1rem;">재료 추가</h3>
            <button onclick="saveSelectedItems()" id="saveBtn" style="background:#4A90E2; color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">추가(0)</button>
        </div>
        <div class="search-container"><input type="text" id="ingSearch" oninput="filterIngredients()" placeholder="재료 검색" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; outline:none;"></div>
        <div class="date-container" style="padding: 0 20px 15px; background: #f8f9fa;"><input type="date" id="expiryInput" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; outline:none;"></div>
        <div id="ingredientGrid" class="ingredient-grid"></div>
    </div>

    <script>
        let selectedItems = new Set();

        // 🌟 실시간 날짜 수정 함수 (POST 방식 적용)
        async function updateItemInline(itemName, element) {
            const newDate = element.value;
            if (!newDate) return;

            const url = `/update-item/${encodeURIComponent(itemName)}`;
            console.log("요청 주소:", url);

            try {
                const response = await fetch(url, {
                    method: 'POST', // 405 방지를 위해 서버와 맞춘 POST
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ expiry_date: newDate })
                });

                if (response.ok) {
                    location.reload(); 
                } else {
                    alert("수정 실패 (에러 코드: " + response.status + ")");
                }
            } catch (err) {
                console.error("네트워크 에러:", err);
            }
        }

        async function openAddPage() {
            document.getElementById('addPage').style.display = 'flex';
            document.getElementById('expiryInput').value = new Date().toISOString().split('T')[0];
            const response = await fetch('/items/search');
            const results = await response.json();
            document.getElementById('ingredientGrid').innerHTML = results.map(item => `
                <div class="ing-item" onclick="toggleItem('${item.name}', this)">
                    <span style="font-size:1.5rem; margin-bottom:5px;">📦</span>
                    <div style="font-size:0.9rem; font-weight:500;">${item.name}</div>
                </div>
            `).join('');
        }

        function closeAddPage() { document.getElementById('addPage').style.display = 'none'; }
        
        function toggleItem(name, el) {
            if (selectedItems.has(name)) { selectedItems.delete(name); el.classList.remove('selected'); }
            else { selectedItems.add(name); el.classList.add('selected'); }
            document.getElementById('saveBtn').innerText = `추가(${selectedItems.size})`;
        }

        async function saveSelectedItems() {
            const date = document.getElementById('expiryInput').value;
            for (let name of selectedItems) {
                await fetch('/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, category: '냉장', expiry_date: date })
                });
            }
            location.reload();
        }

        async function deleteItem(name) {
            if (confirm(`'${name}' 삭제하시겠습니까?`)) {
                await fetch(`/items/${encodeURIComponent(name)}`, { method: 'DELETE' });
                location.reload();
            }
        }

        function filterIngredients() {
            const query = document.getElementById('ingSearch').value.toLowerCase();
            document.querySelectorAll('.ing-item').forEach(el => {
                el.classList.toggle('hidden', !el.innerText.toLowerCase().includes(query));
            });
        }
    </script>
</body>
</html>
